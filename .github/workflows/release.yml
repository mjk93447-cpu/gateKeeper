name: Release self-contained Windows bundle

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra release
      - run: uv run python scripts/validate_english_docs.py
      - name: Download OCR pretrained model into bundle
        shell: pwsh
        run: |
          $env:GATEKEEPER_OCR_DIR = "$PWD\models\ocr"
          uv run python scripts/download_ocr_model.py
      - name: Download and verify YOLO26 PCB checkpoint
        shell: pwsh
        run: |
          uv run python scripts/prepare_release_models.py `
            --detector-url "https://huggingface.co/betty0/pcb-defect-detection/resolve/main/best.onnx?download=true" `
            --detector-sha256 "057C61DBD2745F59BD246EFFEBF47A31686E95B0E2263610B0600664E5210FC5" `
            --checkpoint-url "https://huggingface.co/betty0/pcb-defect-detection/resolve/main/best.pt?download=true" `
            --checkpoint-sha256 "9D2D1B6414E2DD9A1BFDD9D24D5C5A79C153DDE03575E9ECB4E2DE69C68A316C"
      - name: Enforce production approval gates
        run: uv run python scripts/check_release_gate.py --manifest models/manifest.json
      - name: Build bundle
        run: uv run python scripts/build_release_bundle.py --output dist/gateKeeper-release
      - name: Upload GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: gh release create "${{ github.ref_name }}" dist/gateKeeper-release/gateKeeper.zip --generate-notes
