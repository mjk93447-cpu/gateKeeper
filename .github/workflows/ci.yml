name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest
